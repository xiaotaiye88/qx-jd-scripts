# 京东 Cookie 抓取规则 (Quantumult X 资源订阅)
# 订阅地址: https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/jd_scripts.conf
# 圈X → 风车 → 资源 → 右上角+ → 粘贴上方订阅地址

[rewrite_local]
# 抓取 pt_key + pt_pin（使用body类型，API权限更高）
^https?://api\.m\.jd\.com/ url script-response-body https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/qx_jd_cookie.js

[mitm]
hostname = api.m.jd.com
