# 京东脚本全家桶 (Quantumult X 资源订阅)
# 订阅地址: https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/jd_scripts.conf
# 圈X → 风车 → 资源 → 右上角+ → 粘贴上方订阅地址
#
# 包含:
#   1. [rewrite] 打开京东 App 时自动抓取 pt_key+pt_pin+wskey，
#      推送 ntfy 并同步到 BoxJs（CookiesJD），供任务脚本使用
#   2. [task] 积分换话费（青龙 jdpro 的 jd_dwapp.js 打包移植版）

[rewrite_local]
# 抓取 pt_key + pt_pin + wskey，每分钟同账号最多推1次，推送到 ntfy
^https?://api\.m\.jd\.com/ url script-request-header https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/qx_jd_all.js

[task_local]
# 积分换话费：每天 02:38 / 15:38 运行（与上游青龙 cron 一致）
38 2,15 * * * https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/scripts/jd_dwapp.qx.js, tag=积分换话费, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/jd.png, enabled=true

[mitm]
hostname = api.m.jd.com
