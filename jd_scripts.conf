# 京东 Cookie 抓取规则 (Quantumult X 资源订阅)
# 订阅地址: https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/jd_scripts.conf
# 圈X → 风车 → 资源 → 右上角+ → 粘贴上方订阅地址

[rewrite_local]
# 抓取 pt_key + pt_pin (弹窗显示)
^https?://api\.m\.jd\.com/ url script-request-header https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/qx_jd_cookie.js

# 抓取 wskey (推送ntfy)
^https?://api\.m\.jd\.com/ url script-request-header https://raw.githubusercontent.com/xiaotaiye88/qx-jd-scripts/master/qx_jd_wskey.js

[mitm]
hostname = api.m.jd.com
